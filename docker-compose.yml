# docker-compose.yml

version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gkg_net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - ES_HOST=${ES_HOST}
      - ES_USERNAME=${ES_USERNAME}
      - ES_PASSWORD=${ES_PASSWORD}
      - ES_INDEX=${ES_INDEX}
      - ES_VERIFY_SSL=${ES_VERIFY_SSL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_API_KEY=${LLM_API_KEY}
      - MAX_RESULT_DOCS=${MAX_RESULT_DOCS}
      - MAX_AGG_BUCKETS=${MAX_AGG_BUCKETS}
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gkg_net

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gkg_net

networks:
  gkg_net:
    driver: bridge